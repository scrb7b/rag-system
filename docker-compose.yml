services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true 
    tty: true
    volumes:
      - ./data:/app/data        
      - model_cache:/root/.cache  
    env_file:
      - src/.env
    environment:
      - QDRANT_LOCATION=http://qdrant:6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    depends_on:
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334" 
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
    name: kernel_rag_qdrant_data
  model_cache:
    name: kernel_rag_model_cache
